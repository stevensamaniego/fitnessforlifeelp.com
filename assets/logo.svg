<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strong-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- FITNESS FOR LIFE text with blue glow -->
  <text x="400" y="72" text-anchor="middle" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" font-size="80" font-weight="700" fill="#FFFFFF" letter-spacing="8" filter="url(#cyan-glow)">FITNESS FOR LIFE</text>
  
  <!-- Heartbeat EKG line - realistic waveform -->
  <!-- Left side EKG -->
  <path d="M 0,130 L 120,130 L 130,128 L 135,132 L 140,130 L 180,130 L 190,125 L 195,130 L 200,115 L 205,100 L 210,70 L 215,155 L 220,140 L 225,125 L 230,130 L 250,130 L 260,126 L 268,130 L 290,130" 
        stroke="#00BFFF" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#cyan-glow)"/>
  
  <!-- Right side EKG (mirrored) -->
  <path d="M 510,130 L 530,130 L 540,126 L 548,130 L 570,130 L 575,125 L 580,140 L 585,155 L 590,70 L 595,100 L 600,115 L 605,130 L 610,125 L 615,130 L 620,130 L 660,130 L 665,132 L 670,128 L 675,130 L 800,130" 
        stroke="#00BFFF" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#cyan-glow)"/>
  
  <!-- GYM text with glow -->
  <text x="400" y="148" text-anchor="middle" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" font-size="60" font-weight="700" fill="#00BFFF" letter-spacing="12" filter="url(#strong-glow)">GYM</text>
</svg>
